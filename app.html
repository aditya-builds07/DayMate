<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Littlebird Calendar - Your smart, beautiful calendar app." />
  <title>Littlebird — Calendar</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/calendar.css" />
  <link rel="stylesheet" href="css/components.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app-layout">

    <!-- ===== TOP BAR ===== -->
    <header class="app-topbar">
      <div class="app-topbar-left">
        <a href="index.html" class="app-logo">
          <svg viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6 2 10c0 2.5 1.5 4.7 3.8 6.2L4 22l4.5-2.5C9.6 19.8 10.8 20 12 20c5.52 0 10-4 10-8s-4.48-8-10-8z"/>
            <circle cx="8" cy="10" r="1" fill="currentColor" stroke="none"/>
            <circle cx="12" cy="10" r="1" fill="currentColor" stroke="none"/>
            <circle cx="16" cy="10" r="1" fill="currentColor" stroke="none"/>
          </svg>
          <span>Littlebird</span>
        </a>

        <button id="btn-add-event" class="add-event-btn">
          <svg viewBox="0 0 24 24">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New Event
        </button>

        <div class="quick-add-container">
          <svg viewBox="0 0 24 24">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
          <input type="text" id="quick-add-input" placeholder="Quick add: 'Lunch at 1pm tomorrow'" />
        </div>
      </div>

      <div class="app-topbar-right">
        <div class="search-bar">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search-input" placeholder="Search events..." />
        </div>

        <a href="guide.html" class="icon-btn" title="Guide">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </a>

        <button id="btn-analytics" class="icon-btn" title="Insights & Analytics">
          <svg viewBox="0 0 24 24">
            <path d="M3 3v18h18"/>
            <path d="M18 17V9"/>
            <path d="M13 17V5"/>
            <path d="M8 17v-3"/>
          </svg>
        </button>

        <button id="btn-booking" class="icon-btn" title="Booking Page">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
            <path d="M8 14h.01"/>
            <path d="M12 14h.01"/>
            <path d="M16 14h.01"/>
            <path d="M8 18h.01"/>
            <path d="M12 18h.01"/>
            <path d="M16 18h.01"/>
          </svg>
        </button>

        <button id="btn-sidebar" class="icon-btn" title="Upcoming events (S)">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          <span class="notif-dot"></span>
        </button>
      </div>
    </header>

    <!-- ===== STATS BAR ===== -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 6v6l4 2"/>
          </svg>
        </div>
        <div>
          <div class="stat-value"><span id="stat-today">0</span></div>
          <div class="stat-label">Today</div>
        </div>
      </div>

      <div class="stat-divider"></div>

      <div class="stat-item">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <div>
          <div class="stat-value"><span id="stat-week">0</span></div>
          <div class="stat-label">This Week</div>
        </div>
      </div>

      <div class="stat-divider"></div>

      <div class="stat-item">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </div>
        <div>
          <div class="stat-value"><span id="stat-month">0</span></div>
          <div class="stat-label">This Month</div>
        </div>
      </div>

      <div class="stat-divider"></div>

      <div class="stat-item">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </div>
        <div>
          <div class="stat-value" style="font-size: 14px; font-weight: 500;"><span id="stat-next">—</span></div>
          <div class="stat-label">Next Up</div>
        </div>
      </div>
    </div>

    <!-- ===== MAIN AREA ===== -->
    <div class="app-main">
      <div class="calendar-container">
        <!-- Calendar Nav -->
        <div class="calendar-nav">
          <div class="calendar-nav-left">
            <button id="btn-prev" class="nav-btn" title="Previous month (←)">
              <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <h2 class="calendar-month-title">June 2026</h2>
            <button id="btn-next" class="nav-btn" title="Next month (→)">
              <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
            </button>
            <button id="btn-today" class="today-btn">Today</button>
          </div>
          <div class="calendar-nav-right">
            <div class="filter-pills">
              <button class="filter-pill active" data-filter="all">
                All
              </button>
              <button class="filter-pill" data-filter="meeting">
                <span class="dot" style="background: var(--cat-meeting)"></span>
                Meeting
              </button>
              <button class="filter-pill" data-filter="personal">
                <span class="dot" style="background: var(--cat-personal)"></span>
                Personal
              </button>
              <button class="filter-pill" data-filter="reminder">
                <span class="dot" style="background: var(--cat-reminder)"></span>
                Reminder
              </button>
              <button class="filter-pill" data-filter="deadline">
                <span class="dot" style="background: var(--cat-deadline)"></span>
                Deadline
              </button>
            </div>
          </div>
        </div>

        <!-- Day Headers -->
        <div class="calendar-header">
          <span>Sun</span>
          <span>Mon</span>
          <span>Tue</span>
          <span>Wed</span>
          <span>Thu</span>
          <span>Fri</span>
          <span>Sat</span>
        </div>

        <!-- Calendar Grid (rendered by JS) -->
        <div class="calendar-grid"></div>
      </div>

      <!-- ===== SIDEBAR ===== -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-tabs">
            <button class="sidebar-tab active" data-target="upcoming">Upcoming</button>
            <button class="sidebar-tab" data-target="tasks">Tasks</button>
          </div>
          <button id="btn-close-sidebar" class="icon-btn">
            <svg viewBox="0 0 24 24">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        </div>
        <div id="sidebar-body" class="sidebar-body">
          <!-- Rendered by JS -->
        </div>
        <div id="sidebar-tasks" class="sidebar-body" style="display: none;">
          <div class="task-input-group">
            <input type="text" id="new-task-input" placeholder="Add a task..." />
            <button id="btn-add-task">+</button>
          </div>
          <div class="task-list" id="task-list">
            <!-- Rendered by JS -->
          </div>
        </div>
      </aside>
    </div>

    <!-- ===== EVENT MODAL ===== -->
    <div id="modal-backdrop" class="modal-backdrop">
      <div class="modal">
        <div class="modal-header">
          <h2>
            <svg viewBox="0 0 24 24">
              <path d="M12 20h9"/>
              <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
            <span id="modal-title-text">New Event</span>
          </h2>
          <button id="modal-close" class="modal-close">
            <svg viewBox="0 0 24 24">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <div class="modal-body">
          <div class="form-group">
            <label for="event-title">Title</label>
            <input type="text" id="event-title" placeholder="What's happening?" />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="event-date">Date</label>
              <input type="date" id="event-date" />
            </div>
            <div class="form-group">
              <label for="event-time">Time</label>
              <input type="time" id="event-time" value="09:00" />
            </div>
          </div>

          <div class="form-group">
            <label>Category</label>
            <div class="category-picker">
              <button class="category-option selected" data-cat="meeting">
                <span class="dot" style="background: var(--cat-meeting)"></span>
                Meeting
              </button>
              <button class="category-option" data-cat="personal">
                <span class="dot" style="background: var(--cat-personal)"></span>
                Personal
              </button>
              <button class="category-option" data-cat="reminder">
                <span class="dot" style="background: var(--cat-reminder)"></span>
                Reminder
              </button>
              <button class="category-option" data-cat="deadline">
                <span class="dot" style="background: var(--cat-deadline)"></span>
                Deadline
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="event-notes">Notes</label>
            <textarea id="event-notes" placeholder="Add details..."></textarea>
          </div>
        </div>

        <div class="modal-footer">
          <button id="modal-delete" class="btn-danger" style="display: none;">
            Delete
          </button>
          <div style="display: flex; gap: 8px; margin-left: auto;">
            <button id="modal-cancel" class="btn-secondary">Cancel</button>
            <button id="modal-save" class="btn-primary">Save Event</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- ===== ANALYTICS OVERLAY ===== -->
  <div id="analytics-overlay" class="fullscreen-overlay">
    <div class="overlay-container">
      <div class="overlay-header">
        <h2>Time Insights</h2>
        <button class="icon-btn close-overlay" data-target="analytics-overlay">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="overlay-body">
        <div class="chart-container">
          <canvas id="timeChart"></canvas>
        </div>
        <div class="analytics-stats">
          <div class="stat-card">
            <h3>Total Events</h3>
            <p id="stat-total-events">0</p>
          </div>
          <div class="stat-card">
            <h3>Busiest Category</h3>
            <p id="stat-busiest-cat">-</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== BOOKING OVERLAY ===== -->
  <div id="booking-overlay" class="fullscreen-overlay">
    <div class="overlay-container">
      <div class="overlay-header">
        <h2>Public Booking Page Preview</h2>
        <button class="icon-btn close-overlay" data-target="booking-overlay">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="overlay-body booking-body">
        <div class="booking-profile">
          <div class="profile-avatar">AD</div>
          <h3>Book a meeting with Aditya</h3>
          <p>30 Min Meeting</p>
        </div>
        <div class="booking-selector">
          <div class="form-group">
            <label>Select Date</label>
            <input type="date" id="booking-date" />
          </div>
          <div class="form-group">
            <label>Select Time</label>
            <div class="time-slots">
              <button class="time-slot">09:00 AM</button>
              <button class="time-slot">10:30 AM</button>
              <button class="time-slot">01:00 PM</button>
              <button class="time-slot">03:30 PM</button>
            </div>
          </div>
          <div class="form-group">
            <label>Guest Details</label>
            <input type="text" id="booking-name" placeholder="Name" />
          </div>
          <button id="btn-confirm-booking" class="btn-primary" style="width: 100%; margin-top: var(--space-md);">Confirm Booking</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/animations.js"></script>
  <script src="js/events.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
